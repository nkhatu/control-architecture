name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  backend-tests:
    name: backend-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install backend dependencies
        run: uv sync --extra dev

      - name: Run backend tests
        run: uv run pytest

  ops-console-build:
    name: ops-console-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/ops-console/package-lock.json

      - name: Install ops-console dependencies
        run: npm ci
        working-directory: apps/ops-console

      - name: Build ops-console
        run: npm run build
        working-directory: apps/ops-console
